# Cloudflare Workers config for self-hosting StudBud on your own account.
# Deploy with: bun run deploy
#
# Notes:
# - This app is SSR (TanStack Start + server functions), so it deploys as a
#   Cloudflare Worker with static assets, not classic Cloudflare Pages.
# - `main` and `[assets] directory` point at nitro's Cloudflare build output.
# - Values in [vars] are PUBLIC (baked into the client bundle anyway).
#   For secrets, use `bunx wrangler secret put <NAME>` — never put them here.

name = "studbud"
main = ".output/server/index.mjs"
compatibility_date = "2026-07-08"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".output/public"

[vars]
VITE_SUPABASE_URL = "https://voogcsgjglhbscoxmcgb.supabase.co"
VITE_SUPABASE_PROJECT_ID = "voogcsgjglhbscoxmcgb"
VITE_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_1kMlWQk48BDwwN9T0EWOSA_3LhQbJn8"

SUPABASE_URL = "https://voogcsgjglhbscoxmcgb.supabase.co"
SUPABASE_PUBLISHABLE_KEY = "sb_publishable_1kMlWQk48BDwwN9T0EWOSA_3LhQbJn8"
